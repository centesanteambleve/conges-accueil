<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendrier Accueil — CSAmblève</title>
<style>
  :root {
    --bg:#f5f4f0;--surface:#fff;--surface2:#f9f8f5;--border:#e0ddd6;
    --text:#1a1a18;--text2:#6b6b66;--text3:#9b9b96;
    --accent:#2563eb;--accent-bg:#eff6ff;--accent-border:#bfdbfe;
    --green:#16a34a;--green-bg:#f0fdf4;--green-border:#bbf7d0;
    --amber:#d97706;--amber-bg:#fffbeb;--amber-border:#fde68a;
    --red:#dc2626;--red-bg:#fef2f2;--red-border:#fecaca;
    --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-border:#ddd6fe;
    --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
  .app{display:flex;height:100vh;overflow:hidden;}
  .sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .content{flex:1;overflow-y:auto;padding:20px;}
  .sidebar-header{padding:16px;border-bottom:1px solid var(--border);}
  .sidebar-header h1{font-size:15px;font-weight:600;}
  .sidebar-header p{font-size:12px;color:var(--text2);margin-top:2px;}
  .sidebar-section{padding:12px 16px 6px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;}
  .member-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:background .1s;}
  .member-item:hover{background:var(--bg);}
  .member-item.active{background:var(--accent-bg);}
  .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
  .member-name{font-size:13px;font-weight:500;}
  .member-leave{font-size:11px;color:var(--text2);}
  .sidebar-bottom{padding:12px 16px;border-top:1px solid var(--border);margin-top:auto;display:flex;flex-direction:column;gap:6px;}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:all .1s;white-space:nowrap;}
  .btn:hover{background:var(--bg);border-color:#ccc;}
  .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn-primary:hover{background:#1d4ed8;}
  .btn-sm{padding:4px 10px;font-size:12px;}
  .btn-danger{background:var(--red);color:#fff;border-color:var(--red);}
  .btn-danger:hover{background:#b91c1c;}
  .btn-success{background:var(--green);color:#fff;border-color:var(--green);}
  .btn-success:hover{background:#15803d;}
  .btn-icon{padding:6px;border-radius:var(--radius);}
  .topbar h2{font-size:15px;font-weight:600;flex:1;}
  .nav-arrows{display:flex;align-items:center;gap:4px;}
  .month-label{font-size:14px;font-weight:600;min-width:160px;text-align:center;}
  .view-tabs{display:flex;background:var(--bg);border-radius:var(--radius);padding:2px;border:1px solid var(--border);}
  .view-tab{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);transition:all .1s;}
  .view-tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow);}
  .calendar-grid{background:var(--surface);border-radius:10px;border:1px solid var(--border);overflow:hidden;}
  .cal-header{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg);border-bottom:1px solid var(--border);}
  .cal-day-name{padding:8px;text-align:center;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;}
  .cal-body{display:grid;grid-template-columns:repeat(7,1fr);}
  .cal-cell{min-height:88px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px;cursor:pointer;transition:background .1s;}
  .cal-cell:hover{background:var(--surface2);}
  .cal-cell:nth-child(7n){border-right:none;}
  .cal-cell.other-month{background:var(--bg);opacity:.5;cursor:default;}
  .cal-cell.today .day-num{background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
  .day-num{font-size:12px;font-weight:500;color:var(--text2);width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
  .cal-events{display:flex;flex-direction:column;gap:2px;margin-top:2px;}
  .cal-event{border-radius:4px;padding:2px 5px;font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
  .ev-conge-pending{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
  .ev-conge-valid{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
  .ev-conge-refused{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);text-decoration:line-through;}
  .ev-maladie{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
  .ev-sup{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border);}
  .ev-ant{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border);}
  .annual-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .mini-month{background:var(--surface);border-radius:10px;border:1px solid var(--border);overflow:hidden;}
  .mini-month-header{padding:8px 12px;background:var(--bg);border-bottom:1px solid var(--border);font-size:12px;font-weight:600;text-align:center;}
  .mini-cal-header{display:grid;grid-template-columns:repeat(7,1fr);}
  .mini-day-name{padding:3px 2px;text-align:center;font-size:9px;color:var(--text3);}
  .mini-cal-body{display:grid;grid-template-columns:repeat(7,1fr);padding:4px;gap:1px;}
  .mini-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:9px;cursor:pointer;}
  .mini-cell:hover{background:var(--bg);}
  .mini-cell.other-month{color:var(--text3);}
  .mini-cell.mc-today{background:var(--accent);color:#fff;border-radius:50%;}
  .mini-cell.mc-conge-valid{background:var(--green-bg);color:var(--green);}
  .mini-cell.mc-conge-pending{background:var(--amber-bg);color:var(--amber);}
  .mini-cell.mc-maladie{background:var(--red-bg);color:var(--red);}
  .mini-cell.mc-heures{background:var(--accent-bg);color:var(--accent);}
  .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
  .summary-card{background:var(--surface);border-radius:10px;border:1px solid var(--border);padding:14px;}
  .summary-label{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
  .summary-value{font-size:22px;font-weight:600;color:var(--text);}
  .summary-value.pos{color:var(--green);}
  .summary-value.neg{color:var(--red);}
  .summary-sub{font-size:11px;color:var(--text2);margin-top:2px;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;}
  .modal{background:var(--surface);border-radius:12px;width:500px;max-width:calc(100vw - 32px);box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden;}
  .modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .modal-header h3{font-size:15px;font-weight:600;}
  .modal-body{padding:20px;}
  .modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
  .form-group{margin-bottom:14px;}
  .form-label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;}
  .form-input,.form-select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--surface);color:var(--text);outline:none;transition:border-color .1s;}
  .form-input:focus,.form-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .form-hint{font-size:11px;color:var(--text3);margin-top:4px;}
  .info-box{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:var(--radius);padding:8px 12px;font-size:12px;color:var(--accent);margin-top:8px;}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;}
  .badge-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
  .badge-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
  .badge-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
  .badge-blue{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border);}
  .event-list{display:flex;flex-direction:column;gap:6px;}
  .event-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:12px;}
  .event-row-info{flex:1;}
  .event-row-title{font-size:13px;font-weight:500;}
  .event-row-sub{font-size:11px;color:var(--text2);margin-top:1px;}
  .legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);}
  .legend-dot{width:10px;height:10px;border-radius:2px;}
  .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;}
  .tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .1s;}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .tab:hover:not(.active){color:var(--text);}
  .toast{position:fixed;bottom:20px;right:20px;background:#1a1a18;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:200;animation:slideUp .2s ease;}
  @keyframes slideUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
  .login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200;}
  .login-card{background:var(--surface);border-radius:12px;padding:28px;width:320px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .login-card h3{font-size:16px;font-weight:600;margin-bottom:6px;}
  .login-card p{font-size:13px;color:var(--text2);margin-bottom:20px;}
  .pending-count{background:var(--amber);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;margin-left:6px;}
  .av-0{background:#dbeafe;color:#1d4ed8;} .av-1{background:#d1fae5;color:#065f46;}
  .av-2{background:#fce7f3;color:#9d174d;} .av-3{background:#fef3c7;color:#92400e;}
  .av-4{background:#ede9fe;color:#5b21b6;} .av-5{background:#fee2e2;color:#991b1b;}
  .av-6{background:#e0f2fe;color:#0369a1;} .av-7{background:#ecfdf5;color:#065f46;}
</style>
</head>
<body>

<!-- Login -->
<div class="login-overlay" id="loginOverlay" style="display:none;">
  <div class="login-card">
    <h3>Accès administrateur</h3>
    <p>Entrez le mot de passe pour accéder au mode admin</p>
    <div class="form-group" style="text-align:left;">
      <input type="password" class="form-input" id="adminPwInput" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')checkAdminPw()">
    </div>
    <div style="color:var(--red);font-size:12px;margin-bottom:10px;display:none;" id="pwError">Mot de passe incorrect</div>
    <div style="display:flex;gap:8px;">
      <button class="btn" style="flex:1;" onclick="document.getElementById('loginOverlay').style.display='none'">Annuler</button>
      <button class="btn btn-primary" style="flex:1;" onclick="checkAdminPw()">Connexion</button>
    </div>
  </div>
</div>

<!-- Event Modal -->
<div class="modal-overlay" id="eventModal" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Nouvel événement</h3>
      <button class="btn btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<div class="toast" id="toast" style="display:none;"></div>

<!-- App Login Screen -->
<div id="appLoginOverlay" style="position:fixed;inset:0;background:#f5f4f0;display:flex;align-items:center;justify-content:center;z-index:300;">
  <div style="background:white;border-radius:16px;padding:40px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.15);border:1px solid #e0ddd6;">
    <div style="width:56px;height:56px;background:#eff6ff;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px;">📅</div>
    <h2 style="font-size:18px;font-weight:600;margin-bottom:4px;">Calendrier Accueil</h2>
    <p style="font-size:13px;color:#6b6b66;margin-bottom:24px;">CSAmblève — Accès réservé à l'équipe</p>
    <div style="margin-bottom:14px;text-align:left;">
      <label style="display:block;font-size:12px;font-weight:500;color:#6b6b66;margin-bottom:5px;">Mot de passe</label>
      <input type="password" id="appPwInput" class="form-input" placeholder="Entrez le mot de passe" onkeydown="if(event.key==='Enter')checkAppPw()">
    </div>
    <div id="appPwError" style="color:#dc2626;font-size:12px;margin-bottom:10px;display:none;">Mot de passe incorrect</div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="checkAppPw()">Accéder au calendrier</button>
  </div>
</div>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Calendrier Accueil</h1>
      <p>CSAmblève</p>
    </div>
    <div class="sidebar-section">Membres</div>
    <div id="memberList"></div>
    <div class="sidebar-bottom">
      <button class="btn" style="justify-content:center;" onclick="openBalanceEditor()">Capital congés ⚙</button>
      <button class="btn" style="justify-content:center;" onclick="openMembersEditor()">Gérer l'équipe 👥</button>
      <button class="btn" style="justify-content:center;position:relative;" id="pendingBtn" onclick="showPendingView()" style="display:none;">
        Demandes en attente <span class="pending-count" id="pendingCount">0</span>
      </button>
      <button class="btn" style="justify-content:center;" id="adminBtn" onclick="toggleAdmin()">Mode admin</button>
      <div id="adminStatus" style="font-size:12px;color:var(--text2);text-align:center;"></div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <h2 id="topbarTitle">Vue mensuelle</h2>
      <div class="nav-arrows">
        <button class="btn btn-icon" onclick="navigate(-1)">‹</button>
        <span class="month-label" id="monthLabel"></span>
        <button class="btn btn-icon" onclick="navigate(1)">›</button>
        <button class="btn btn-sm" onclick="goToday()">Aujourd'hui</button>
      </div>
      <div style="flex:1;"></div>
      <div class="view-tabs">
        <button class="view-tab active" id="tab-month" onclick="setView('month')">Mois</button>
        <button class="view-tab" id="tab-year" onclick="setView('year')">Année</button>
        <button class="view-tab" id="tab-list" onclick="setView('list')">Récap</button>
      </div>
      <button class="btn btn-primary" onclick="openAddEvent()">+ Ajouter</button>
    </div>
    <div class="content" id="mainContent"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:"AIzaSyCIOs_eaFG25R_EBtE8tRDMORI8O12GeOM",
  authDomain:"conges-accueil-csa.firebaseapp.com",
  databaseURL:"https://conges-accueil-csa-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"conges-accueil-csa",
  storageBucket:"conges-accueil-csa.firebasestorage.app",
  messagingSenderId:"474731301812",
  appId:"1:474731301812:web:84fb01ed7ea0d2e05b40e1"
};
const ADMIN_PASSWORD = "admin1234"; // À changer !
const APP_PASSWORD = "accueil2026";
const WEB3FORMS_KEY = "c5c8ebae-e233-4e85-8a25-34f856a526ec";
const NOTIFY_EMAIL = "michel.noel@csambleve.be";
const DEFAULT_MEMBERS = ["Michel","Audrey","Florence","Jean-Michel","Jennifer","Jessica","Mélissa","Valentine","Doris"];
const MEMBER_EMAILS = {
  "Michel":     "michel.noel@csambleve.be",
  "Audrey":     "audray.macaut@csambleve.be",
  "Florence":   "florence.ahn@csambleve.be",
  "Jean-Michel":"jm.castro@csambleve.be",
  "Jennifer":   "jennifer.riga@csambleve.be",
  "Jessica":    "jessica.charlier@csambleve.be",
  "Mélissa":    "melissa.gregoire@csambleve.be",
  "Valentine":  "valentine.wilket@csambleve.be",
  "Doris":      "doris.dirani@csambleve.be"
};
let MEMBERS = [...DEFAULT_MEMBERS];
const MONTHS_FR = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const DAYS_FR = ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];

// ── STATE ─────────────────────────────────────────────────────────────────
let db=null, isFirebaseOk=false;
let events={}, leaveBalances={};
let isAdmin=false, currentView="month";
let currentDate=new Date(), selectedMember=null;

// ── FIREBASE ──────────────────────────────────────────────────────────────
// Tant que FIREBASE_CONFIG contient les valeurs "placeholder" de démo,
// on force le mode local pour éviter d'écrire dans le vide.
const FIREBASE_IS_CONFIGURED = !FIREBASE_CONFIG.apiKey.includes("Demo-placeholder");

if(FIREBASE_IS_CONFIGURED){
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.database();
    db.ref("events").on("value",snap=>{ events=snap.val()||{}; renderAll(); });
    db.ref("leaveBalances").on("value",snap=>{ leaveBalances=snap.val()||{}; renderAll(); });
    db.ref("members").on("value",snap=>{ const v=snap.val(); if(v&&Array.isArray(v)&&v.length) MEMBERS=v; renderAll(); });
    isFirebaseOk=true;
  } catch(e){ isFirebaseOk=false; loadLocal(); }
} else {
  isFirebaseOk=false;
  loadLocal();
}

function loadLocal(){
  try{
    events=JSON.parse(localStorage.getItem("csa_ev")||"{}");
    leaveBalances=JSON.parse(localStorage.getItem("csa_bal")||"{}");
    const storedMembers=JSON.parse(localStorage.getItem("csa_members")||"null");
    if(storedMembers && Array.isArray(storedMembers) && storedMembers.length) MEMBERS=storedMembers;
  }catch(e){}
  renderAll();
}
function saveLocal(){ localStorage.setItem("csa_ev",JSON.stringify(events)); localStorage.setItem("csa_bal",JSON.stringify(leaveBalances)); }
function saveMembersList(){
  if(isFirebaseOk) db.ref("members").set(MEMBERS);
  else localStorage.setItem("csa_members",JSON.stringify(MEMBERS));
}

function saveEvent(ev){
  if(isFirebaseOk){ if(ev.id) db.ref("events/"+ev.id).set(ev); else{ const r=db.ref("events").push(); ev.id=r.key; r.set(ev); } }
  else{ if(!ev.id) ev.id="ev_"+Date.now()+"_"+Math.random().toString(36).slice(2); events[ev.id]=ev; saveLocal(); renderAll(); }
}
function deleteEventById(id){
  if(isFirebaseOk) db.ref("events/"+id).remove();
  else{ delete events[id]; saveLocal(); renderAll(); }
}
function saveBalance(member,data){
  const key=isFirebaseOk?btoa(encodeURIComponent(member)):member;
  if(isFirebaseOk) db.ref("leaveBalances/"+key).set(data);
  else{ leaveBalances[member]=data; saveLocal(); renderAll(); }
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function initials(n){ return n.split(" ").map(p=>p[0]).join("").toUpperCase().slice(0,2); }
function avClass(i){ return "av-"+(i%8); }
function fmtDate(d){ if(!d) return ""; const[y,m,day]=d.split("-"); return `${day}/${m}/${y}`; }
function fmtH(h){ if(h==null) return ""; const n=parseFloat(h); if(isNaN(n)) return "0h"; const rounded=Math.round(n*100)/100; const str=rounded%1===0?rounded.toFixed(0):rounded.toFixed(2).replace(/0$/,"").replace(/\.$/,""); return str.replace(".",",")+"h"; }
function datesBetween(s,e){ const a=[]; let c=new Date(s); const l=new Date(e); while(c<=l){ a.push(c.toISOString().slice(0,10)); c.setDate(c.getDate()+1); } return a; }
function getBalance(m){ return leaveBalances[m]||{total:0}; }
function showToast(msg,dur=2500){ const t=document.getElementById("toast"); t.textContent=msg; t.style.display="block"; setTimeout(()=>t.style.display="none",dur); }

// ── NOTIFICATION EMAIL (Web3Forms) ──────────────────────────────────────
function sendNotification(subject, message, recipientEmail){
  // Always notify admin
  fetch("https://api.web3forms.com/submit", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Accept": "application/json" },
    body: JSON.stringify({
      access_key: WEB3FORMS_KEY,
      subject: subject,
      from_name: "Calendrier Accueil CSAmblève",
      email: NOTIFY_EMAIL,
      message: message
    })
  }).catch(err => console.log("Notification admin échouée :", err));

  // Also notify the employee if a recipient is provided and different from admin
  if(recipientEmail && recipientEmail !== NOTIFY_EMAIL){
    fetch("https://api.web3forms.com/submit", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "application/json" },
      body: JSON.stringify({
        access_key: WEB3FORMS_KEY,
        subject: subject,
        from_name: "Calendrier Accueil CSAmblève",
        email: recipientEmail,
        message: message
      })
    }).catch(err => console.log("Notification employée échouée :", err));
  }
}

// Hours used in validated leaves
function getLeaveUsedH(m){ let h=0; Object.values(events).forEach(ev=>{ if(ev.member===m&&ev.type==="conge"&&ev.status==="validated") h+=parseFloat(ev.hours||0); }); return h; }
// Overtime
function getOvertime(m){ let sup=0,ant=0; Object.values(events).forEach(ev=>{ if(ev.member!==m) return; if(ev.type==="sup") sup+=parseFloat(ev.hours||0); if(ev.type==="ant") ant+=parseFloat(ev.hours||0); }); return{sup,ant,net:sup-ant}; }
function pendingList(){ return Object.values(events).filter(ev=>ev.type==="conge"&&ev.status==="pending"); }

// ── RENDER ALL ────────────────────────────────────────────────────────────
function renderAll(){ renderSidebar(); if(currentView==="month") renderMonth(); else if(currentView==="year") renderYear(); else renderList(); }

// ── SIDEBAR ───────────────────────────────────────────────────────────────
function renderSidebar(){
  const list=document.getElementById("memberList"); list.innerHTML="";
  const allBtn=document.createElement("button");
  allBtn.className="member-item"+(selectedMember===null?" active":"");
  allBtn.innerHTML=`<div class="avatar" style="background:var(--bg);color:var(--text2);">✦</div><div><div class="member-name">Tous les membres</div></div>`;
  allBtn.onclick=()=>{ selectedMember=null; renderAll(); };
  list.appendChild(allBtn);

  MEMBERS.forEach((m,i)=>{
    const bal=getBalance(m); const used=getLeaveUsedH(m); const rem=(bal.total||0)-used;
    const btn=document.createElement("button");
    btn.className="member-item"+(selectedMember===m?" active":"");
    btn.innerHTML=`<div class="avatar ${avClass(i)}">${initials(m)}</div><div style="flex:1;min-width:0;"><div class="member-name">${m}</div><div class="member-leave">${fmtH(rem)} restantes</div></div>`;
    btn.onclick=()=>{ selectedMember=m; renderAll(); };
    list.appendChild(btn);
  });

  const pCount=pendingList().length;
  const pendingBtn=document.getElementById("pendingBtn");
  const pendingCountEl=document.getElementById("pendingCount");
  pendingBtn.style.display=isAdmin&&pCount>0?"flex":"none";
  if(pendingCountEl) pendingCountEl.textContent=pCount;

  const statusEl=document.getElementById("adminStatus");
  const adminBtn=document.getElementById("adminBtn");
  if(isAdmin){ statusEl.innerHTML='<span style="background:#1a1a18;color:#fff;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;">⚙ Admin actif</span>'; adminBtn.textContent="Quitter admin"; }
  else{ statusEl.innerHTML=""; adminBtn.textContent="Mode admin"; }
}

// ── MONTH VIEW ────────────────────────────────────────────────────────────
function renderMonth(){
  document.getElementById("topbarTitle").textContent="Vue mensuelle";
  const y=currentDate.getFullYear(),m=currentDate.getMonth();
  document.getElementById("monthLabel").textContent=MONTHS_FR[m]+" "+y;
  const first=new Date(y,m,1);
  let startDow=first.getDay(); if(startDow===0) startDow=7; startDow--;
  const dim=new Date(y,m+1,0).getDate();
  const today=new Date().toISOString().slice(0,10);

  const evMap={};
  Object.values(events).forEach(ev=>{
    if(selectedMember&&ev.member!==selectedMember) return;
    datesBetween(ev.dateStart,ev.dateEnd||ev.dateStart).forEach(d=>{ if(!evMap[d]) evMap[d]=[]; evMap[d].push(ev); });
  });

  let html=`<div class="summary-grid" id="summaryCards"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--amber-bg);border:1px solid var(--amber-border);"></div>Congé en attente</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--green-bg);border:1px solid var(--green-border);"></div>Congé validé</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red-bg);border:1px solid var(--red-border);"></div>Maladie</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent-bg);border:1px solid var(--accent-border);"></div>Heures sup.</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--purple-bg);border:1px solid var(--purple-border);"></div>Départ anticipé</div>
  </div>
  <div class="calendar-grid">
    <div class="cal-header">${DAYS_FR.map(d=>`<div class="cal-day-name">${d}</div>`).join("")}</div>
    <div class="cal-body">`;

  const prevDays=new Date(y,m,0).getDate();
  for(let i=startDow-1;i>=0;i--) html+=`<div class="cal-cell other-month"><div class="day-num">${prevDays-i}</div></div>`;

  for(let d=1;d<=dim;d++){
    const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const isToday=ds===today;
    const dow=new Date(y,m,d).getDay();
    const isWE=dow===0||dow===6;
    const dayEvs=evMap[ds]||[];
    html+=`<div class="cal-cell${isToday?" today":""}${isWE?" other-month":""}" onclick="onCellClick('${ds}')">
      <div class="day-num">${d}</div><div class="cal-events">`;
    dayEvs.slice(0,3).forEach(ev=>{
      let cls="",label="";
      if(ev.type==="conge") cls=ev.status==="validated"?"ev-conge-valid":ev.status==="refused"?"ev-conge-refused":"ev-conge-pending";
      else if(ev.type==="maladie") cls="ev-maladie";
      else if(ev.type==="sup") cls="ev-sup";
      else if(ev.type==="ant") cls="ev-ant";
      if(selectedMember){
        if(ev.type==="sup") label="+"+fmtH(ev.hours);
        else if(ev.type==="ant") label="-"+fmtH(ev.hours);
        else if(ev.type==="conge") label="Congé "+fmtH(ev.hours);
        else label="Maladie";
      } else {
        label=ev.member.split(" ")[0]+(ev.type==="sup"?" +"+fmtH(ev.hours):ev.type==="ant"?" -"+fmtH(ev.hours):"");
      }
      html+=`<div class="cal-event ${cls}" onclick="event.stopPropagation();openEventDetail('${ev.id}')" title="${ev.member}">${label}</div>`;
    });
    if(dayEvs.length>3) html+=`<div style="font-size:10px;color:var(--text3);padding:1px 4px;">+${dayEvs.length-3}</div>`;
    html+=`</div></div>`;
  }
  const rem2=(startDow+dim)%7; const fill=rem2===0?0:7-rem2;
  for(let d=1;d<=fill;d++) html+=`<div class="cal-cell other-month"><div class="day-num">${d}</div></div>`;
  html+=`</div></div>`;
  document.getElementById("mainContent").innerHTML=html;
  renderSummaryCards();
}

function renderSummaryCards(){
  const c=document.getElementById("summaryCards"); if(!c) return;
  if(selectedMember){
    const bal=getBalance(selectedMember); const used=getLeaveUsedH(selectedMember); const rem=(bal.total||0)-used;
    const{sup,ant,net}=getOvertime(selectedMember);
    const pending=Object.values(events).filter(ev=>ev.member===selectedMember&&ev.type==="conge"&&ev.status==="pending").length;
    c.innerHTML=`
      <div class="summary-card"><div class="summary-label">Solde congés</div><div class="summary-value${rem<0?" neg":rem>10?" pos":""}">${fmtH(rem)}</div><div class="summary-sub">Capital : ${fmtH(bal.total||0)} — Pris : ${fmtH(used)}</div></div>
      <div class="summary-card"><div class="summary-label">Heures supplémentaires</div><div class="summary-value pos">+${fmtH(sup)}</div></div>
      <div class="summary-card"><div class="summary-label">Départs anticipés</div><div class="summary-value neg">-${fmtH(ant)}</div></div>
      <div class="summary-card"><div class="summary-label">Solde net heures</div><div class="summary-value${net<0?" neg":" pos"}">${net>=0?"+":""}${fmtH(Math.abs(net))}</div>${pending>0?`<div class="summary-sub">${pending} congé(s) en attente</div>`:""}</div>`;
  } else {
    const pCount=pendingList().length;
    let sick=0; Object.values(events).forEach(ev=>{ if(ev.type==="maladie") sick++; });
    c.style.gridTemplateColumns="repeat(2,1fr)";
    c.innerHTML=`
      <div class="summary-card"><div class="summary-label">Demandes en attente</div><div class="summary-value${pCount>0?" neg":""}">${pCount}</div><div class="summary-sub">Congés à valider</div></div>
      <div class="summary-card"><div class="summary-label">Absences maladie</div><div class="summary-value">${sick}</div><div class="summary-sub">Total enregistrées</div></div>`;
  }
}

// ── YEAR VIEW ─────────────────────────────────────────────────────────────
function renderYear(){
  document.getElementById("topbarTitle").textContent="Vue annuelle";
  document.getElementById("monthLabel").textContent=currentDate.getFullYear();
  const y=currentDate.getFullYear(), today=new Date().toISOString().slice(0,10);
  const evMap={};
  Object.values(events).forEach(ev=>{
    if(selectedMember&&ev.member!==selectedMember) return;
    datesBetween(ev.dateStart,ev.dateEnd||ev.dateStart).forEach(d=>{ if(!evMap[d]) evMap[d]=[]; evMap[d].push(ev); });
  });
  let html=`<div class="annual-grid">`;
  for(let mi=0;mi<12;mi++){
    const first=new Date(y,mi,1);
    let sdow=first.getDay(); if(sdow===0) sdow=7; sdow--;
    const dim=new Date(y,mi+1,0).getDate();
    html+=`<div class="mini-month"><div class="mini-month-header">${MONTHS_FR[mi]}</div>
      <div class="mini-cal-header">${DAYS_FR.map(d=>`<div class="mini-day-name">${d[0]}</div>`).join("")}</div>
      <div class="mini-cal-body">`;
    for(let i=0;i<sdow;i++) html+=`<div class="mini-cell other-month"></div>`;
    for(let d=1;d<=dim;d++){
      const ds=`${y}-${String(mi+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const isToday=ds===today;
      const dayEvs=evMap[ds]||[];
      let cls="";
      if(isToday) cls="mc-today";
      else if(dayEvs.some(e=>e.type==="conge"&&e.status==="validated")) cls="mc-conge-valid";
      else if(dayEvs.some(e=>e.type==="conge"&&e.status==="pending")) cls="mc-conge-pending";
      else if(dayEvs.some(e=>e.type==="maladie")) cls="mc-maladie";
      else if(dayEvs.some(e=>e.type==="sup"||e.type==="ant")) cls="mc-heures";
      html+=`<div class="mini-cell ${cls}" onclick="goToDate('${ds}')" title="${ds}">${d}</div>`;
    }
    html+=`</div></div>`;
  }
  html+=`</div>`;
  document.getElementById("mainContent").innerHTML=html;
}
function goToDate(ds){ currentDate=new Date(ds); setView("month"); }

// ── LIST VIEW ─────────────────────────────────────────────────────────────
function renderList(){
  document.getElementById("topbarTitle").textContent="Récapitulatif";
  document.getElementById("monthLabel").textContent=currentDate.getFullYear();
  const pCount=pendingList().length;
  let html=`<div class="tabs">
    <button class="tab active" id="tabConge" onclick="switchTab('conge')">Congés</button>
    <button class="tab" id="tabHeures" onclick="switchTab('heures')">Heures</button>
    <button class="tab" id="tabMaladie" onclick="switchTab('maladie')">Maladies</button>
    ${isAdmin?`<button class="tab" id="tabPending" onclick="switchTab('pending')">En attente <span class="pending-count">${pCount}</span></button>`:""}
  </div><div id="listContent"></div>`;
  document.getElementById("mainContent").innerHTML=html;
  switchTab("conge");
}
function switchTab(tab){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  const el=document.getElementById("tab"+tab.charAt(0).toUpperCase()+tab.slice(1));
  if(el) el.classList.add("active");
  const y=currentDate.getFullYear();
  const c=document.getElementById("listContent"); if(!c) return;

  if(tab==="pending"){
    const items=pendingList();
    if(!items.length){ c.innerHTML=`<div style="padding:20px;color:var(--text2);text-align:center;">Aucune demande en attente</div>`; return; }
    c.innerHTML=`<div class="event-list">`+items.map(ev=>`
      <div class="event-row">
        <div class="badge badge-amber">En attente</div>
        <div class="event-row-info">
          <div class="event-row-title">${ev.member}</div>
          <div class="event-row-sub">${fmtDate(ev.dateStart)}${ev.dateEnd&&ev.dateEnd!==ev.dateStart?" → "+fmtDate(ev.dateEnd):""} · ${fmtH(ev.hours)}${ev.note?` · "${ev.note}"`:""}
          </div>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-success btn-sm" onclick="validateLeave('${ev.id}')">✓ Valider</button>
          <button class="btn btn-danger btn-sm" onclick="refuseLeave('${ev.id}')">✕ Refuser</button>
        </div>
      </div>`).join("")+`</div>`;
    return;
  }

  const types=tab==="conge"?["conge"]:tab==="heures"?["sup","ant"]:["maladie"];
  let evs=Object.values(events).filter(ev=>{
    if(selectedMember&&ev.member!==selectedMember) return false;
    if(!types.includes(ev.type)) return false;
    if(ev.dateStart.slice(0,4)!==String(y)) return false;
    return true;
  }).sort((a,b)=>a.dateStart.localeCompare(b.dateStart));

  let html2="";
  if(tab==="heures"&&selectedMember){
    const{sup,ant,net}=getOvertime(selectedMember);
    html2+=`<div style="display:flex;gap:10px;margin-bottom:16px;">
      <div class="summary-card" style="flex:1;"><div class="summary-label">Heures sup.</div><div class="summary-value pos">+${fmtH(sup)}</div></div>
      <div class="summary-card" style="flex:1;"><div class="summary-label">Départs anticipés</div><div class="summary-value neg">-${fmtH(ant)}</div></div>
      <div class="summary-card" style="flex:1;"><div class="summary-label">Solde net</div><div class="summary-value ${net<0?"neg":"pos"}">${net>=0?"+":""}${fmtH(Math.abs(net))}</div></div>
    </div>`;
  }
  if(!evs.length){ c.innerHTML=html2+`<div style="padding:20px;color:var(--text2);text-align:center;">Aucun événement pour ${y}</div>`; return; }
  html2+=`<div class="event-list">`+evs.map(ev=>{
    let badge="",sub="";
    if(ev.type==="conge"){
      const st=ev.status==="validated"?"badge-green":ev.status==="refused"?"badge-red":"badge-amber";
      const sl=ev.status==="validated"?"Validé":ev.status==="refused"?"Refusé":"En attente";
      badge=`<div class="badge ${st}">${sl}</div>`;
      sub=`${fmtDate(ev.dateStart)}${ev.dateEnd&&ev.dateEnd!==ev.dateStart?" → "+fmtDate(ev.dateEnd):""} · ${fmtH(ev.hours)}`;
    } else if(ev.type==="maladie"){
      badge=`<div class="badge badge-red">Maladie</div>`;
      sub=`${fmtDate(ev.dateStart)}${ev.dateEnd&&ev.dateEnd!==ev.dateStart?" → "+fmtDate(ev.dateEnd):""}`;
    } else if(ev.type==="sup"){
      badge=`<div class="badge badge-blue">Heures sup.</div>`;
      sub=`${fmtDate(ev.dateStart)} · +${fmtH(ev.hours)}`;
    } else if(ev.type==="ant"){
      badge=`<div class="badge" style="background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border);">Départ anticipé</div>`;
      sub=`${fmtDate(ev.dateStart)} · -${fmtH(ev.hours)}`;
    }
    return `<div class="event-row">${badge}<div class="event-row-info">
      <div class="event-row-title">${selectedMember?"":ev.member+" · "}${sub}</div>
      ${ev.note?`<div class="event-row-sub">${ev.note}</div>`:""}
    </div>${isAdmin?`<button class="btn btn-icon btn-sm" onclick="deleteEventById('${ev.id}');renderAll();" title="Supprimer" style="color:var(--red);">🗑</button>`:""}</div>`;
  }).join("")+`</div>`;
  c.innerHTML=html2;
}

// ── ADD EVENT ─────────────────────────────────────────────────────────────
function onCellClick(ds){ openAddEvent(ds); }
function openAddEvent(prefillDate){
  const today=prefillDate||new Date().toISOString().slice(0,10);
  document.getElementById("modalTitle").textContent="Nouvel événement";
  document.getElementById("modalBody").innerHTML=`
    <div class="form-group">
      <label class="form-label">Membre</label>
      <select class="form-select" id="evMember">${MEMBERS.map(m=>`<option value="${m}"${selectedMember===m?" selected":""}>${m}</option>`).join("")}</select>
    </div>
    <div class="form-group">
      <label class="form-label">Type d'événement</label>
      <select class="form-select" id="evType" onchange="onTypeChange()">
        <option value="conge">Congé</option>
        <option value="maladie">Maladie</option>
        <option value="sup">Heures supplémentaires</option>
        <option value="ant">Départ anticipé</option>
      </select>
    </div>
    <div id="dateBlock">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Date de début</label>
          <input type="date" class="form-input" id="evDateStart" value="${today}" oninput="onTypeChange()">
        </div>
        <div class="form-group" id="dateEndGroup">
          <label class="form-label">Date de fin</label>
          <input type="date" class="form-input" id="evDateEnd" value="${today}">
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" id="hoursLabel">Nombre d'heures</label>
      <input type="text" class="form-input" id="evHours" placeholder="ex : 7,5 ou 1,25 = 1h15" inputmode="decimal">
      <div class="form-hint">0.25 = 15 min · 0.5 = 30 min · 0.75 = 45 min · 1.25 = 1h15</div>
    </div>
    <div id="infoBox" class="info-box" style="display:none;"></div>
    <div class="form-group">
      <label class="form-label">Note (optionnel)</label>
      <input type="text" class="form-input" id="evNote" placeholder="Remarque éventuelle">
    </div>`;
  document.getElementById("modalFooter").innerHTML=`<button class="btn" onclick="closeModal()">Annuler</button><button class="btn btn-primary" onclick="submitEvent()">Enregistrer</button>`;
  document.getElementById("eventModal").style.display="flex";
  onTypeChange();
}

function onTypeChange(){
  const type=document.getElementById("evType")?.value;
  const isHours=type==="sup"||type==="ant";
  const dateEndGroup=document.getElementById("dateEndGroup");
  const hoursLabel=document.getElementById("hoursLabel");
  const infoBox=document.getElementById("infoBox");
  if(dateEndGroup) dateEndGroup.style.display=isHours?"none":"block";
  if(hoursLabel){
    if(type==="conge") hoursLabel.textContent="Nombre d'heures de congé impactées";
    else if(type==="maladie") hoursLabel.textContent="Nombre d'heures (optionnel)";
    else if(type==="sup") hoursLabel.textContent="Heures supplémentaires effectuées";
    else hoursLabel.textContent="Heures de départ anticipé";
  }
  // Info on leave balance
  if(type==="conge"&&infoBox){
    const member=document.getElementById("evMember")?.value;
    if(member){
      const bal=getBalance(member); const used=getLeaveUsedH(member); const rem=(bal.total||0)-used;
      infoBox.style.display="block";
      infoBox.textContent=`Solde actuel de ${member} : ${fmtH(rem)} restantes (capital ${fmtH(bal.total||0)} — utilisées ${fmtH(used)})`;
    }
  } else if(infoBox) infoBox.style.display="none";
}

function submitEvent(){
  const member=document.getElementById("evMember").value;
  const type=document.getElementById("evType").value;
  const note=document.getElementById("evNote").value;
  const dateStart=document.getElementById("evDateStart").value;
  const isHours=type==="sup"||type==="ant";
  const dateEnd=isHours?dateStart:(document.getElementById("evDateEnd").value||dateStart);
  const hours=parseFloat((document.getElementById("evHours").value||"0").replace(",","."));

  if(!dateStart){ alert("Veuillez sélectionner une date."); return; }
  if((type==="conge"||type==="sup"||type==="ant")&&(!hours||hours<=0)){ alert("Veuillez indiquer le nombre d'heures."); return; }
  if(!isHours&&new Date(dateStart)>new Date(dateEnd)){ alert("La date de fin doit être après la date de début."); return; }

  const ev={member,type,dateStart,dateEnd,hours:hours||null,note,status:type==="conge"?"pending":"ok"};
  if(isAdmin&&type==="conge") ev.status="validated";
  saveEvent(ev);
  closeModal();
  showToast(type==="conge"?"Demande de congé enregistrée — en attente de validation ✓":"Événement enregistré ✓");

  // Notification email à l'admin
  const typeLabels={conge:"Demande de congé",maladie:"Maladie",sup:"Heures supplémentaires",ant:"Départ anticipé"};
  let msg = `${member} a encodé : ${typeLabels[type]}\n`;
  msg += `Date : ${fmtDate(dateStart)}${dateEnd&&dateEnd!==dateStart?" → "+fmtDate(dateEnd):""}\n`;
  if(hours) msg += `Heures : ${fmtH(hours)}\n`;
  if(note) msg += `Note : ${note}\n`;
  if(type==="conge") msg += `\nStatut : en attente de validation. Connecte-toi pour valider ou refuser.`;
  sendNotification(`Calendrier Accueil — ${typeLabels[type]} (${member})`, msg);
}

// ── EVENT DETAIL ──────────────────────────────────────────────────────────
function openEventDetail(id){
  const ev=events[id]; if(!ev) return;
  document.getElementById("modalTitle").textContent="Détail";
  const typeLabels={conge:"Congé",maladie:"Maladie",sup:"Heures supplémentaires",ant:"Départ anticipé"};
  let badge="";
  if(ev.type==="conge"){
    const st=ev.status==="validated"?"badge-green":ev.status==="refused"?"badge-red":"badge-amber";
    const sl=ev.status==="validated"?"Congé validé":ev.status==="refused"?"Congé refusé":"En attente de validation";
    badge=`<div class="badge ${st}" style="margin-bottom:12px;">${sl}</div><br>`;
  }
  let body=`${badge}<div style="display:grid;gap:10px;">
    <div><span style="color:var(--text2);font-size:12px;">Membre</span><div style="font-weight:500;margin-top:2px;">${ev.member}</div></div>
    <div><span style="color:var(--text2);font-size:12px;">Type</span><div style="font-weight:500;margin-top:2px;">${typeLabels[ev.type]||ev.type}</div></div>
    <div><span style="color:var(--text2);font-size:12px;">Période</span><div style="font-weight:500;margin-top:2px;">${fmtDate(ev.dateStart)}${ev.dateEnd&&ev.dateEnd!==ev.dateStart?" → "+fmtDate(ev.dateEnd):""}</div></div>
    ${ev.hours?`<div><span style="color:var(--text2);font-size:12px;">Heures</span><div style="font-weight:500;margin-top:2px;">${ev.type==="ant"?"-":ev.type==="sup"?"+":""}${fmtH(ev.hours)}</div></div>`:""}
    ${ev.note?`<div><span style="color:var(--text2);font-size:12px;">Note</span><div style="font-weight:500;margin-top:2px;">${ev.note}</div></div>`:""}
  </div>`;
  document.getElementById("modalBody").innerHTML=body;
  let footer=`<button class="btn" onclick="closeModal()">Fermer</button>`;
  if(isAdmin){
    footer+=`<button class="btn btn-danger btn-sm" onclick="deleteEventById('${id}');renderAll();closeModal();">Supprimer</button>`;
    if(ev.type==="conge"&&ev.status==="pending"){
      footer+=`<button class="btn btn-danger" onclick="refuseLeave('${id}')">Refuser</button>`;
      footer+=`<button class="btn btn-success" onclick="validateLeave('${id}')">Valider</button>`;
    }
  }
  document.getElementById("modalFooter").innerHTML=footer;
  document.getElementById("eventModal").style.display="flex";
}

// ── ADMIN ─────────────────────────────────────────────────────────────────
function validateLeave(id){
  if(!isAdmin){ showAdminLogin(()=>validateLeave(id)); return; }
  const ev=events[id]; if(!ev) return;
  ev.status="validated"; saveEvent(ev); closeModal(); showToast("Congé validé ✓"); renderAll();
  const employeeEmail = MEMBER_EMAILS[ev.member];
  const msg = `Bonjour ${ev.member},\n\nTa demande de congé a été VALIDÉE.\n\nPériode : ${fmtDate(ev.dateStart)}${ev.dateEnd&&ev.dateEnd!==ev.dateStart?" → "+fmtDate(ev.dateEnd):""}\nHeures : ${fmtH(ev.hours)}\n${ev.note?"Note : "+ev.note+"\n":""}\nBonne vacances !\nMichel`;
  sendNotification(`✅ Congé validé — ${ev.member}`, msg, employeeEmail);
}
function refuseLeave(id){
  if(!isAdmin){ showAdminLogin(()=>refuseLeave(id)); return; }
  const ev=events[id]; if(!ev) return;
  ev.status="refused"; saveEvent(ev); closeModal(); showToast("Congé refusé"); renderAll();
  const employeeEmail = MEMBER_EMAILS[ev.member];
  const msg = `Bonjour ${ev.member},\n\nTa demande de congé a été REFUSÉE.\n\nPériode : ${fmtDate(ev.dateStart)}${ev.dateEnd&&ev.dateEnd!==ev.dateStart?" → "+fmtDate(ev.dateEnd):""}\nHeures : ${fmtH(ev.hours)}\n${ev.note?"Note : "+ev.note+"\n":""}\nPour toute question, contacte Michel.`;
  sendNotification(`❌ Congé refusé — ${ev.member}`, msg, employeeEmail);
}
function toggleAdmin(){
  if(isAdmin){ isAdmin=false; renderAll(); showToast("Mode admin désactivé"); return; }
  showAdminLogin(()=>{ isAdmin=true; renderAll(); showToast("Mode admin activé ✓"); });
}
function showAdminLogin(cb){
  window._adminCb=cb;
  document.getElementById("adminPwInput").value="";
  document.getElementById("pwError").style.display="none";
  document.getElementById("loginOverlay").style.display="flex";
  setTimeout(()=>document.getElementById("adminPwInput").focus(),100);
}
function checkAdminPw(){
  if(document.getElementById("adminPwInput").value===ADMIN_PASSWORD){
    document.getElementById("loginOverlay").style.display="none";
    if(window._adminCb){ window._adminCb(); window._adminCb=null; }
  } else {
    document.getElementById("pwError").style.display="block";
    document.getElementById("adminPwInput").value="";
  }
}
function showPendingView(){ setView("list"); setTimeout(()=>switchTab("pending"),50); }

// ── BALANCE EDITOR ────────────────────────────────────────────────────────
function openBalanceEditor(){
  if(!isAdmin){ showAdminLogin(openBalanceEditor); return; }
  document.getElementById("modalTitle").textContent="Capital congés (en heures)";
  let body=`<div style="font-size:12px;color:var(--text2);margin-bottom:14px;">Définissez le capital annuel d'heures de congé pour chaque membre. Chaque contrat peut être différent.</div><div style="display:grid;gap:10px;">`;
  MEMBERS.forEach((m,i)=>{
    const bal=getBalance(m); const used=getLeaveUsedH(m); const rem=(bal.total||0)-used;
    body+=`<div style="display:flex;align-items:center;gap:10px;">
      <div class="avatar ${avClass(i)}" style="width:28px;height:28px;font-size:10px;">${initials(m)}</div>
      <div style="flex:1;font-size:13px;font-weight:500;">${m}</div>
      <div style="font-size:11px;color:var(--text2);margin-right:6px;">${fmtH(rem)} rest.</div>
      <input type="text" class="form-input" style="width:90px;text-align:right;" id="bal_${i}" value="${bal.total||0}" placeholder="0">
      <span style="font-size:12px;color:var(--text2);">h</span>
    </div>`;
  });
  body+=`</div>`;
  document.getElementById("modalBody").innerHTML=body;
  document.getElementById("modalFooter").innerHTML=`<button class="btn" onclick="closeModal()">Annuler</button><button class="btn btn-primary" onclick="saveAllBalances()">Enregistrer</button>`;
  document.getElementById("eventModal").style.display="flex";
}
function openMembersEditor(){
  if(!isAdmin){ showAdminLogin(openMembersEditor); return; }
  document.getElementById("modalTitle").textContent="Gérer l'équipe";
  let body=`<div style="font-size:12px;color:var(--text2);margin-bottom:14px;">Ajoute ou retire des membres de l'équipe Accueil. Attention : retirer un membre ne supprime pas son historique déjà encodé.</div>
  <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;" id="membersEditList">`;
  MEMBERS.forEach((m,i)=>{
    body+=`<div style="display:flex;align-items:center;gap:10px;">
      <div class="avatar ${avClass(i)}" style="width:28px;height:28px;font-size:10px;">${initials(m)}</div>
      <div style="flex:1;font-size:13px;font-weight:500;">${m}</div>
      <button class="btn btn-icon btn-sm" style="color:var(--red);" onclick="removeMember('${m.replace(/'/g,"\\'")}')" title="Retirer">🗑</button>
    </div>`;
  });
  body+=`</div>
  <div class="form-group" style="display:flex;gap:8px;">
    <input type="text" class="form-input" id="newMemberName" placeholder="Nom du nouveau membre" onkeydown="if(event.key==='Enter') addMember()">
    <button class="btn btn-primary btn-sm" onclick="addMember()">+ Ajouter</button>
  </div>`;
  document.getElementById("modalBody").innerHTML=body;
  document.getElementById("modalFooter").innerHTML=`<button class="btn" onclick="closeModal()">Fermer</button>`;
  document.getElementById("eventModal").style.display="flex";
}
function addMember(){
  const input=document.getElementById("newMemberName");
  const name=(input?.value||"").trim();
  if(!name){ return; }
  if(MEMBERS.includes(name)){ showToast("Ce membre existe déjà"); return; }
  MEMBERS.push(name);
  saveMembersList();
  if(!isFirebaseOk) renderAll();
  showToast(`${name} ajouté(e) à l'équipe ✓`);
  openMembersEditor();
}
function removeMember(name){
  if(!confirm(`Retirer ${name} de l'équipe ? Son historique encodé restera visible mais elle n'apparaîtra plus dans les listes.`)) return;
  MEMBERS = MEMBERS.filter(m=>m!==name);
  saveMembersList();
  if(selectedMember===name) selectedMember=null;
  if(!isFirebaseOk) renderAll();
  showToast(`${name} retiré(e) de l'équipe`);
  openMembersEditor();
}

function saveAllBalances(){
  MEMBERS.forEach((m,i)=>{
    const raw=(document.getElementById("bal_"+i)?.value||"0").replace(",",".");
    const val=parseFloat(raw)||0;
    saveBalance(m,{total:val});
  });
  closeModal(); renderAll(); showToast("Capitaux enregistrés ✓");
}

// ── MODAL / NAV ───────────────────────────────────────────────────────────
function closeModal(){ document.getElementById("eventModal").style.display="none"; }
function navigate(dir){ if(currentView==="year") currentDate.setFullYear(currentDate.getFullYear()+dir); else currentDate.setMonth(currentDate.getMonth()+dir); renderAll(); }
function goToday(){ currentDate=new Date(); renderAll(); }
function setView(v){ currentView=v; ["month","year","list"].forEach(x=>document.getElementById("tab-"+x)?.classList.remove("active")); document.getElementById("tab-"+v)?.classList.add("active"); renderAll(); }

// ── APP LOGIN ─────────────────────────────────────────────────────────────
function checkAppPw(){
  const val = document.getElementById("appPwInput").value;
  if(val === APP_PASSWORD){
    document.getElementById("appLoginOverlay").style.display = "none";
    document.getElementById("appPwError").style.display = "none";
    sessionStorage.setItem("csa_app_auth","1");
  } else {
    document.getElementById("appPwError").style.display = "block";
    document.getElementById("appPwInput").value = "";
    document.getElementById("appPwInput").focus();
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────
if(sessionStorage.getItem("csa_app_auth")==="1"){
  document.getElementById("appLoginOverlay").style.display = "none";
} else {
  setTimeout(()=>document.getElementById("appPwInput").focus(), 100);
}
renderAll();
</script>
</body>
</html>
